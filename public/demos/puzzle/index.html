<html>

<head>
    <meta http-equiv="content-type" content="text/html; charset=UTF-8">
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" type="text/css" href="./assets/css/main.css">
    <script type="text/javascript" src="./assets/js/tweenMax.js"></script>
    <script type="text/javascript" src="./assets/js/Draggable.js"></script>
</head>

<body>

    <div id="adArea" class="rct opacity0" style="opacity: 1;">


        <img id="picture" class="noDisplay" src="./assets/img/picture.png?v2"
            style="position: absolute; width: 175px; height: 175px;">
        <div id="bg" class=""
            style="background-image: url(./assets/img/bg.png); position: absolute; width: 300px; height: 250px;">
        </div>
        <div id="board" class=""
            style="background-image: url(./assets/img/board.png); position: absolute; width: 300px; height: 250px; transform: matrix(1, 0, 0, 1, 0, 0);">
            <div id="mozaicBoard" class="mozaicPlace">

            </div>
            <div id="draggablesBoard" class="mozaicPlace">

            </div>


        </div>
        <div id="t1" class=""
            style="background-image: url(./assets/img/t1.png); position: absolute; width: 300px; height: 250px; opacity: 0; transform: matrix(1, 0, 0, 1, 0, 230);">
        </div>
        <div id="t2" class=""
            style="background-image: url(./assets/img/t2.png); position: absolute; width: 300px; height: 250px; opacity: 0; transform: matrix(1, 0, 0, 1, 0, 230);">
        </div>
        <div id="t3" class=""
            style="background-image: url(./assets/img/t3.png); position: absolute; width: 300px; height: 250px; opacity: 0; transform: matrix(1, 0, 0, 1, 0, 230);">
        </div>
        <div id="tbg" class=""></div>
        <div id="slide_2" class="rct noDisplay">
            <div id="title" class="opacity0">Nice!</div>
            <div id="message" class="opacity0">Good job</div>
            <div id="frame2" class=""
                style="background-image: url(./assets/img/frame2.png?v2); position: absolute; width: 300px; height: 250px;">
            </div>
        </div>
    </div>


    <script type="text/javascript" src="./assets/js/main.js"></script>
    <script>



        var _dsptr = function (e) { var track = new Image(); track.src = "{EVENT_URL}" + e; }
        function ctaFunction(url) {
            window.open("https://smartbee.az");
        }

        var assets_url = "./assets/img/";

        var assets = {
            init: [
                {
                    format: "png",
                    type: "id",
                    scale: 1,
                    names: "bg board"
                },
                {
                    format: "png",
                    type: "id",
                    scale: 1,
                    names: "t1 t2 t3"
                },
                {
                    format: "png?v2",
                    type: "src",
                    scale: 1,
                    names: "picture"
                },
            ],
            end: [
                {
                    format: "png?v2",
                    type: "id",
                    scale: 1,
                    names: "frame2"
                }
            ]
        }

        var assetsCur = 0;
        var assetsTotal = 0;
        var allLoaded = false;
        var kaspinasImg;
        var swipe_allowed = false;

        function initLoad() {
            loadAsset(assets.init);
        }

        function loadOther() {
            assetsTotal = Object.size(assets);
            for (var prop in assets) {
                if (prop != "init") {
                    loadAsset(assets[prop]);
                }
            }
        }

        function loadMid() {
            loadAsset(assets.mid);
        }

        function loadEnd() {
            loadAsset(assets.end);
        }

        function loadAsset(a) {
            a.cur_asset_pack = 0;
            a.asset_packs = a.length;

            for (var o = 0; o < a.asset_packs; o++) {
                var names = a[o].names.split(" ");
                a[o].curLoad = 0;

                for (var i = 0; i < names.length; i++) {
                    var img = new Image();
                    img.myCustomData = { total: names.length, a: a, name: names[i], numb: o };
                    img.onload = function () {
                        objects[this.myCustomData.name] = document.getElementById(this.myCustomData.name);

                        var type = this.myCustomData.a[this.myCustomData.numb].type;
                        var elAmm = 1;
                        if (type == "class") {
                            objects[this.myCustomData.name] = document.getElementsByClassName(this.myCustomData.name);
                            elAmm = objects[this.myCustomData.name].length;
                        }

                        for (var j = 0; j < elAmm; j++) {
                            var el;
                            if (type == "class") {
                                el = objects[this.myCustomData.name][j];
                                el.style.backgroundImage = "url(" + this.src + ")";
                            } else if (type == "id") {
                                el = objects[this.myCustomData.name];
                                el.style.backgroundImage = "url(" + this.src + ")";
                            } else if (type == "src") {
                                el = objects[this.myCustomData.name];
                                objects[this.myCustomData.name].src = this.src;
                            }

                            el.style.position = "absolute";
                            el.style.width = this.width + "px";
                            el.style.height = this.height + "px";

                            if (this.myCustomData.a[this.myCustomData.numb].scale != 1) {
                                var scale = 1 / this.myCustomData.a[this.myCustomData.numb].scale;
                            }
                        }

                        countAsset(this.myCustomData.a, this.myCustomData.numb, this.myCustomData.total);
                    };
                    img.src = assets_url + names[i] + "." + a[o].format;
                }
            }
        }

        function countAsset(asset, o, total) {
            asset[o].curLoad++;
            if (asset[o].curLoad == total) {
                asset.cur_asset_pack++;
                if (asset.cur_asset_pack == asset.asset_packs) {
                    assetSetLoaded();
                }
            }
        }

        function assetSetLoaded() {
            assetsCur++;
            if (assetsCur == 1) {
                TweenMax.to(adArea, 0.3, { delay: 0.05, opacity: 1 });
                init();
                loadOther();
            } else if (assetsCur == assetsTotal) {
                allLoaded = true;
            }
        }

        //

        Object.size = function (obj) {
            var size = 0, key;
            for (key in obj) {
                if (obj.hasOwnProperty(key)) size++;
            }
            return size;
        };


        if (window.addEventListener) {
            window.addEventListener('load', initLoad(), false);
        } else if (window.attachEvent) {
            window.attachEvent('onload', initLoad());
        }
        
    </script>



</body>

</html>
