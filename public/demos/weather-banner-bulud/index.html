<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hava Durumu Bannerı</title>
    <link rel="stylesheet" href="./css/main.css?v1">
</head>

<body>
    <div id="weather-banner">
        <div class="cloud_second">
            <img src="./img/cloud_second.png" alt="">
        </div>
        <div class="background_img">
            <img class="banner_bg" src="" alt="">
        </div>
        <div class="icon">
            <img class="icon_img" src="" alt="">
        </div>
        <p class="banner_text">

        </p>
        <div class="sun_rotater">
            <img class="sun_img" src="" alt="">
        </div>
        <div class="banner_bottom">
            <img src="./img/banner_bottom.png" alt="">
        </div>
        <button class="suggestions_btn">Bütün təklifləri gör <img src="./img/arrow-right.svg" alt=""></button>
        <div class="cloud_first">
            <img src="./img/cloud_first.png" alt="">
        </div>
    </div>
    <script src="./js/main.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const element = document.getElementById("weather-banner");
            if (element) {
                element.addEventListener("click", function () {
                    window.open("https://smartbee.az", "_blank");
                });
            }
        });
    </script>
</body>

</html>
