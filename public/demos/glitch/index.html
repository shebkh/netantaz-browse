<html>

<head>
    <meta http-equiv="content-type" content="text/html; charset=UTF-8">
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" type="text/css" href="./css/main.css">
    <style>
        .clip {
            position: absolute;
            width: 100%;
            height: 100%;
            background: url('./img/banner_group.png') no-repeat center;
            transform-origin: center;
            background-size: contain;
        }
    </style>
    <style type="text/css">
        html,
        body {
            margin: 0;
            padding: 0
        }
    </style>
</head>

<body>
    <div id="adsArea">
        <div id="adArea" class="rct wrapper">
            <div id="empty" class="noDisplay"></div>
            <div id="wrap" class="rct">
                <div id="background" class="clip"></div>
                <div id="clip3" class="clip"></div>
                <div id="clip4" class="clip"></div>
                <div id="clipa" class="clip"></div>
                <div id="clip1" class="clip"></div>
                <div id="clip2" class="clip"></div>
                <div id="clipb" class="clip"></div>
            </div>
        </div>
        <script>
        function ctaFunction() { window.open("https://smartbee.az/") }
        function init() 
        { document.getElementById("adArea").addEventListener("click", ctaFunction) } window.addEventListener ? window.addEventListener("load", init(), !1) : window.attachEvent && window.attachEvent("onload", init());</script>
    </div>
</body>

</html>
