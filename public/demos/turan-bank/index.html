<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
        rel="stylesheet">
</head>

<body>
    <main>
        <div class="banner">
            <div class="percent">
                <span>9.9</span>
                <p><span>%</span><span>-dən</span></p>
                <span>başlayaraq</span>
            </div>
            <img src="./img/tbankbanner.png" alt="">
            <a href="javascript:void(0)">
                Kredit sifarişi
                <img src="./img/click_icon.svg" alt="">
            </a>
            <form action="javascript:void(0)" method="post">
                <input maxlength="10" type="text" placeholder="Telefon nömrəsi">
                <span>Telefon nömrəsi düzgün daxil edilməyib!</span>
                <button>
                    Müraciət et
                </button>
            </form>
            <div class="correct_message">
                <img src="./img/check.svg" alt="">
                <p>
                    Müraciətiniz qəbul edilidi!
                    Sizinlə əlaqə saxlanılacaq
                </p>
            </div>
        </div>
    </main>
    <script src="./js/main.js"></script>
</body>

</html>
