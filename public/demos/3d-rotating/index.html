<html lang="en" style="--ad-width: 300px; --ad-height: 250px">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="user-scalable=no, width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta name="ad.size" content="width=300,height=250" />
    <title></title>
    <link rel="stylesheet" type="text/css" href="./css/main.css" />
    <script type="text/javascript" src="./js/TweenMax.js"></script>
    <script type="text/javascript" src="./js/draggable.js"></script>
    <style>
      .pic1 {
        background: url("./img/banner_group.png");
      }

      .pic2 {
        background: url("./img/banner_group2.png");
      }

      .pic3 {
        background: url("./img/banner_group3.png");
      }
    </style>
  </head>

  <body class="inner-page">
    <div id="adsArea">
      <div id="adArea" class="rct opacity0" style="opacity: 1">
        <div
          id="swipe_icon"
          class="rct opacity0"
          style="
            background-image: url('./img/swipe_icon.png');
            position: absolute;
            width: 300px;
            height: 250px;
            transform: matrix(1, 0, 0, 1, 0, 0);
            opacity: 1;
          "
        >
          <div
            id="arrow_r"
            class=""
            style="
              background-image: url('./img/arrow_r.png');
              position: absolute;
              width: 300px;
              height: 250px;
              opacity: 1;
              transform: translate3d(0px, 0px, 0px);
            "
          ></div>
          <div
            id="arrow_l"
            class="opacity0"
            style="
              background-image: url('./img/arrow_l.png');
              position: absolute;
              width: 300px;
              height: 250px;
              opacity: 0;
              transform: translate3d(0px, 0px, 0px);
            "
          ></div>
        </div>
        <div class="wrap noEvents zIndex3000">
          <div
            id="c1"
            class="cube"
            style="
              transform: matrix3d(
                0.54932,
                0,
                -0.0273395,
                0,
                0,
                0.55,
                0,
                0,
                0.0273395,
                0,
                0.54932,
                0,
                0,
                -13.3091,
                0,
                1
              );
            "
          >
            <div id="" class="pic1 rct face ff1" style=""></div>
            <div id="" class="pic1 rct face ff2" style=""></div>
            <div id="" class="pic1 rct face ff3" style=""></div>
            <div id="" class="pic1 rct face ff4" style=""></div>
            <div id="" class="pic2 rct face ff1 noVis" style=""></div>
            <div id="" class="pic2 rct face ff2 noVis" style=""></div>
            <div id="" class="pic2 rct face ff3 noVis" style=""></div>
            <div id="" class="pic2 rct face ff4 noVis" style=""></div>
            <div id="" class="pic3 rct face ff1 noVis" style=""></div>
            <div id="" class="pic3 rct face ff2 noVis" style=""></div>
            <div id="" class="pic3 rct face ff3 noVis" style=""></div>
            <div id="" class="pic3 rct face ff4 noVis" style=""></div>
            <div
              id="pic5"
              class="pic5 rct face f5"
              style="
                background-image: url('./img/pic5.png');
                position: absolute;
                width: 300px;
                height: 300px;
              "
            ></div>
            <div
              id=""
              class="pic5 rct face f6"
              style="
                background-image: url('./img/pic5.png');
                position: absolute;
                width: 300px;
                height: 300px;
              "
            ></div>
          </div>
        </div>
        <div class="wrap noEvents zIndex2400">
          <div id="c2" class="cube">
            <div
              id="shadow"
              class="rct face f7 noVis"
              style="
                background-image: url('./img/shadow.png');
                position: absolute;
                width: 300px;
                height: 300px;
                visibility: visible;
                opacity: 0.55;
                transform: matrix3d(
                  1.375,
                  0,
                  0,
                  0,
                  0,
                  0,
                  1.375,
                  0,
                  0,
                  -1.375,
                  0,
                  0,
                  0,
                  60,
                  0,
                  1
                );
              "
            ></div>
          </div>
        </div>
        <div
          id="cta"
          class="zIndex4000 opacity0"
          style="
            background-image: url('./img/cta.png');
            position: absolute;
            width: 300px;
            height: 250px;
          "
        ></div>
        <div
          id="cta_arrow"
          class="zIndex4000 opacity0"
          style="
            background-image: url('./img/cta_arrow.png');
            position: absolute;
            width: 300px;
            height: 250px;
          "
        ></div>
        <div
          id="dragArea"
          class="rct zIndex5000"
          style="
            transform: translate3d(0px, 0px, 0px);
            user-select: none;
            cursor: move;
            touch-action: none;
            z-index: 1000;
            top: 0px;
            left: 0px;
          "
        ></div>
      </div>
      <script>
        var ctaUrl =
            "https://smartbee.az/"
        function ctaFunction() {
          window.open(ctaUrl);
        }
        function startEvent(event_name) {
          _dsptr(event_name);
        }
        var assets_url =
            "./img/",
          assets = {
            init: [
              { format: "png", type: "class", scale: 1, names: "pic5" },
              {
                format: "png",
                type: "id",
                scale: 1,
                names: "swipe_icon cta cta_arrow shadow arrow_r arrow_l",
              },
            ],
          };
      </script>
      <script src="./js/main.js"></script>
    </div>
  </body>
</html>
